<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartZone Ultra Orders</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-page">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar glass">
    <div class="container nav">
      <a href="admin.html" class="brand">
        <div class="brand-badge">S</div>
        <div>
          <div>Orders Control</div>
          <small>SmartZone Ultra</small>
        </div>
      </a>

      <nav class="nav-links">
        <a href="admin.html">Товари</a>
        <a href="settings.html">Налаштування</a>
        <a href="index.html">На сайт</a>
        <button class="danger-btn" id="logoutBtn">Вийти</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <h2>Замовлення клієнтів</h2>
          <p>Керування статусами та експорт замовлень.</p>
        </div>
        <div class="admin-actions">
          <select class="field compact-field" id="statusFilter">
            <option value="all">Усі статуси</option>
            <option value="new">Нове</option>
            <option value="processing">В обробці</option>
            <option value="shipped">Відправлено</option>
            <option value="done">Завершено</option>
            <option value="cancelled">Скасовано</option>
          </select>
          <button class="ghost-btn" id="exportOrdersBtn">Експорт</button>
          <button class="danger-btn" id="clearOrdersBtn">Очистити всі</button>
        </div>
      </div>

      <div class="orders-list" id="ordersList"></div>
    </div>
  </main>

  <div class="toast" id="toast">
    <strong id="toastTitle">Готово</strong>
    <span id="toastText">Дію виконано.</span>
  </div>

  <script src="store.js"></script>
  <script src="orders.js"></script>
</body>
</html>
