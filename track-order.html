<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartZone Ultra — статус замовлення</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar glass">
    <div class="container nav">
      <a href="index.html" class="brand">
        <div class="brand-badge">S</div>
        <div>
          <div>Order Tracking</div>
          <small>SmartZone Ultra</small>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">На головну</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container layout">
      <section class="panel glass">
        <div class="mini-badge">Track Order</div>
        <h2>Перевірити статус замовлення</h2>
        <p>Введи номер замовлення і телефон.</p>
        <form class="admin-form" id="trackForm">
          <input class="field" name="orderId" placeholder="Номер замовлення, наприклад SZ-123456789" required />
          <input class="field" name="phone" placeholder="Телефон" required />
          <button class="primary-btn" type="submit">Перевірити</button>
        </form>
      </section>

      <section class="panel glass" id="trackResult">
        <div class="empty">Тут з’явиться інформація про замовлення.</div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast">
    <strong id="toastTitle">Готово</strong>
    <span id="toastText">Дію виконано.</span>
  </div>

  <script src="store.js"></script>
  <script src="track-order.js"></script>
</body>
</html>
