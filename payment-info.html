<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата замовлення — SmartZone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-main">
      <a href="index.html" class="logo">
        <div class="logo-badge">S</div>
        <div class="logo-text">
          <strong>Оплата замовлення</strong>
          <small>SmartZone</small>
        </div>
      </a>
      <div></div>
      <div class="header-actions">
        <a class="soft-btn" href="account.html">Кабінет</a>
        <a class="soft-btn" href="track-order.html">Статус</a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container admin-layout">
      <section class="panel">
        <h2>Знайти замовлення</h2>
        <p class="muted">Введи номер замовлення і телефон, щоб побачити інструкцію по оплаті.</p>
        <form class="admin-form" id="paymentLookupForm">
          <input class="field" name="orderId" placeholder="Номер замовлення, наприклад SZ-123456789" required />
          <input class="field" name="phone" placeholder="Телефон" required />
          <button class="main-btn" type="submit">Показати оплату</button>
        </form>
      </section>

      <section class="panel" id="paymentInfoResult">
        <div class="empty">Тут з’явиться інформація про оплату замовлення.</div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast">
    <strong id="toastTitle">Готово</strong>
    <span id="toastText">Дію виконано.</span>
  </div>

  <script src="store.js"></script>
  <script src="payment-info.js"></script>
</body>
</html>
