<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartZone Ultimate Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-page">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar glass">
    <div class="container nav">
      <a href="admin.html" class="brand">
        <div class="brand-badge">S</div>
        <div>
          <div>Admin Settings</div>
          <small>SmartZone Ultimate</small>
        </div>
      </a>

      <nav class="nav-links">
        <a href="admin.html">Товари</a>
        <a href="orders.html">Замовлення</a>
        <a href="index.html">На сайт</a>
        <button class="danger-btn" id="logoutBtn">Вийти</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container layout">
      <section class="panel glass">
        <h2>Змінити логін і пароль</h2>
        <p>Після збереження використовуй нові дані для входу.</p>
        <form class="admin-form" id="credentialsForm">
          <input class="field" name="username" placeholder="Новий логін" required />
          <input class="field" name="password" type="password" placeholder="Новий пароль" required />
          <button class="primary-btn" type="submit">Зберегти</button>
        </form>
      </section>

      <section class="panel glass">
        <h2>Поточний логін</h2>
        <div class="info-card glass">
          <strong id="currentUsername">admin</strong>
          <p>Пароль не показується. Це демо-бойова клієнтська версія.</p>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast">
    <strong id="toastTitle">Готово</strong>
    <span id="toastText">Дію виконано.</span>
  </div>

  <script src="store.js"></script>
  <script src="settings.js"></script>
</body>
</html>
